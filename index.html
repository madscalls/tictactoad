<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toad</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <link rel="stylesheet" type="text/css" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="title">Tic-Tac-Toad</h1>
      <div class="border"></div>
      <h6 class="subtitle">Press on the lilypad to make your next move!</h6>
    </header>
    <main class="main">
      <div class="pond">
        <img
          src="./images/flowers-removebg-preview.png"
          alt="lotus"
          class="pond__lotus lotus__1"
        />

        <img
          src="./images/cattails-removebg-preview.png"
          alt="cat-tail"
          class="pond__cat-tail cat-tail__1"
        />
        <img
          src="./images/flowers-removebg-preview.png"
          alt="lotus"
          class="pond__lotus lotus__2"
        />
        <img
          src="./images/flowers-removebg-preview.png"
          alt="lotus"
          class="pond__lotus lotus__3"
        />

        <img
          src="./images/cattails-removebg-preview.png"
          alt="cat-tail"
          class="pond__cat-tail cat-tail__2"
        />
        <img
          src="./images/flowers-removebg-preview.png"
          alt="lotus"
          class="pond__lotus lotus__4"
        />
        <img
          src="./images/cattails-removebg-preview.png"
          alt="cat-tail"
          class="pond__cat-tail cat-tail__3"
        />
        <div class="pond__grid">
          <div class="pond__cell">
            <img
              src="./images/lillypad-removebg-preview.png"
              alt="lilypad"
              class="pond__lilypad"
            />
          </div>
          <div class="pond__cell">
            <img
              src="./images/lillypad-removebg-preview.png"
              alt="lilypad"
              class="pond__lilypad"
            />
          </div>
          <div class="pond__cell">
            <img
              src="./images/lillypad-removebg-preview.png"
              alt="lilypad"
              class="pond__lilypad"
            />
          </div>
          <div class="pond__cell">
            <img
              src="./images/lillypad-removebg-preview.png"
              alt="lilypad"
              class="pond__lilypad"
            />
          </div>
          <div class="pond__cell">
            <img
              src="./images/lillypad-removebg-preview.png"
              alt="lilypad"
              class="pond__lilypad"
            />
          </div>
          <div class="pond__cell">
            <img
              src="./images/lillypad-removebg-preview.png"
              alt="lilypad"
              class="pond__lilypad"
            />
          </div>
          <div class="pond__cell">
            <img
              src="./images/lillypad-removebg-preview.png"
              alt="lilypad"
              class="pond__lilypad"
            />
          </div>
          <div class="pond__cell">
            <img
              src="./images/lillypad-removebg-preview.png"
              alt="lilypad"
              class="pond__lilypad"
            />
          </div>
          <div class="pond__cell">
            <img
              src="./images/lillypad-removebg-preview.png"
              alt="lilypad"
              class="pond__lilypad"
            />
          </div>
        </div>
        <img
          src="./images/flowers-removebg-preview.png"
          alt="lotus"
          class="pond__lotus lotus__5"
        />

        <img
          src="./images/cattails-removebg-preview.png"
          alt="cat-tail"
          class="pond__cat-tail cat-tail__4"
        />

        <img
          src="./images/cattails-removebg-preview.png"
          alt="cat-tail"
          class="pond__cat-tail cat-tail__5"
        />
      </div>
      <div class="text__container">
        <h2 class="status-text"></h2>
        <button class="restartBtn">RESTART</button>
      </div>
    </main>
    <template>
      <div class="modal-overlay">
        <div class="fireworks-container">
          <div class="firework firework-1"></div>
          <div class="firework firework-2"></div>
          <div class="firework firework-3"></div>
        </div>
        <div class="modal-content">
          <h2>Toad-A-lly Awesome!</h2>
          <p>You Won!</p>
        </div>
      </div></template
    >
    <footer class="footer"></footer>
    <script src="./script.js"></script>
  </body>
</html>
